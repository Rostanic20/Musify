name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: musify_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli -a musify_redis ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Create test environment file
      run: |
        cat > .env << EOF
        DATABASE_HOST=localhost
        DATABASE_PORT=5432
        DATABASE_NAME=musify_test
        DATABASE_USER=postgres
        DATABASE_PASSWORD=postgres
        JWT_SECRET=test-secret-key-for-ci
        JWT_EXPIRY=3600000
        REDIS_HOST=localhost
        REDIS_PORT=6379
        REDIS_PASSWORD=musify_redis
        REDIS_ENABLED=true
        APP_ENV=test
        APP_PORT=8080
        APP_BASE_URL=http://localhost:8080
        EOF

    - name: Run tests
      run: ./gradlew test --info

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: success() || failure()
      with:
        name: test-results
        path: build/reports/tests/test/

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build application
      run: ./gradlew build -x test

    - name: Build Docker image
      run: docker build -t musify-backend:${{ github.sha }} .

    - name: Save Docker image
      run: docker save musify-backend:${{ github.sha }} > musify-backend.tar

    - name: Upload Docker image
      uses: actions/upload-artifact@v4
      with:
        name: docker-image
        path: musify-backend.tar
        retention-days: 1
